<div class="auth-container">
  <div class="auth-card">
    <h2>Xác Thực OTP</h2>
    <p style="text-align: center; margin-bottom: 20px; color: #666;">
      Mã OTP gồm 6 chữ số đã được gửi tới email <br><strong>{{ email }}</strong>
    </p>
    
    <div class="error-alert" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="otpForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="otp">Mã xác thực</label>
        <input type="text" id="otp" formControlName="otp" class="form-control" placeholder="Nhập mã gồm 6 số" maxlength="6">
        <div class="error-text" *ngIf="otpForm.get('otp')?.touched && otpForm.get('otp')?.invalid">
          Vui lòng nhập đúng mã OTP gồm 6 chữ số.
        </div>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="otpForm.invalid || isLoading">
        {{ isLoading ? 'Đang kiểm tra...' : 'Xác Nhận' }}
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/auth/forgot-password">Gửi lại mã?</a>
      <a routerLink="/auth/login"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
    </div>
  </div>
</div>
