<div class="auth-container">
  <div class="auth-card">
    <h2>Quên Mật Khẩu</h2>
    <p style="text-align: center; margin-bottom: 20px; color: #666;">
      Nhập email bạn đã đăng ký, chúng tôi sẽ gửi mã OTP để đặt lại mật khẩu.
    </p>
    
    <div class="error-alert" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
    
    <div class="error-alert" style="background-color: #d4edda; color: #155724;" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" class="form-control" placeholder="Nhập địa chỉ email của bạn">
        <div class="error-text" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
          Vui lòng nhập email hợp lệ.
        </div>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="forgotForm.invalid || isLoading">
        {{ isLoading ? 'Đang gửi...' : 'Gửi Yêu Cầu' }}
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/auth/login"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
    </div>
  </div>
</div>
