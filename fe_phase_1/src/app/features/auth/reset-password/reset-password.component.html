<div class="auth-container">
  <div class="auth-card">
    <h2>Đặt Lại Mật Khẩu</h2>
    <p style="text-align: center; margin-bottom: 20px; color: #666;">
      Nhập mật khẩu mới cho tài khoản của bạn.
    </p>
    
    <div class="error-alert" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" *ngIf="token">
      <div class="form-group">
        <label for="newPassword">Mật khẩu mới</label>
        <input type="password" id="newPassword" formControlName="newPassword" class="form-control" placeholder="Tối thiểu 6 ký tự">
        <div class="error-text" *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.invalid">
          Mật khẩu mới phải có tối thiểu 6 ký tự.
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu mới</label>
        <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu mới">
        <div class="error-text" *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.get('confirmPassword')?.hasError('passwordMismatch')">
          Mật khẩu xác nhận không khớp.
        </div>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="resetForm.invalid || isLoading">
        {{ isLoading ? 'Đang xử lý...' : 'Lưu Thay Đổi' }}
      </button>
    </form>

    <div class="auth-links" *ngIf="!token">
      <a routerLink="/auth/forgot-password">Quay lại gửi yêu cầu</a>
    </div>
  </div>
</div>
