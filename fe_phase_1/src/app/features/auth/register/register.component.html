<div class="auth-container">
  <div class="auth-card">
    <h2>Đăng Ký Tài Khoản</h2>
    
    <div class="error-alert" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Họ và Tên</label>
        <input type="text" id="name" formControlName="name" class="form-control" placeholder="Nhập họ và tên">
      </div>

      <div class="form-group">
        <label for="username">Tên đăng nhập (Username)</label>
        <input type="text" id="username" formControlName="username" class="form-control" placeholder="Nhập username">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" class="form-control" placeholder="Nhập email">
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" formControlName="password" class="form-control" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)">
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Đang xử lý...' : 'Đăng Ký' }}
      </button>
    </form>

    <div class="social-login">
      <div class="divider">
        <span>Hoặc đăng ký bằng</span>
      </div>
      <div class="social-buttons">
        <button type="button" class="btn-social btn-google" (click)="loginWithGoogle()">
          Google
        </button>
        <button type="button" class="btn-social btn-facebook" (click)="loginWithFacebook()">
          Facebook
        </button>
      </div>
    </div>

    <div class="auth-links">
      <a routerLink="/auth/login">Đã có tài khoản? Đăng nhập</a>
    </div>
  </div>
</div>
