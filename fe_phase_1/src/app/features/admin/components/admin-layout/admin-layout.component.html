<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="!isSidebarOpen">
    <div class="sidebar-header">
      <h2 class="logo-text" *ngIf="isSidebarOpen">Admin<span>Portal</span></h2>
      <h2 class="logo-text" *ngIf="!isSidebarOpen">A<span>P</span></h2>
    </div>
    
    <nav class="sidebar-nav">
      <ul class="nav-list">
        <li class="nav-item">
          <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-link">
            <i class="icon">📊</i>
            <span class="nav-text" *ngIf="isSidebarOpen">Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/orders" routerLinkActive="active" class="nav-link">
            <i class="icon">📦</i>
            <span class="nav-text" *ngIf="isSidebarOpen">Đơn hàng</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/products" routerLinkActive="active" class="nav-link">
            <i class="icon">👕</i>
            <span class="nav-text" *ngIf="isSidebarOpen">Sản phẩm</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/categories" routerLinkActive="active" class="nav-link">
            <i class="icon">📂</i>
            <span class="nav-text" *ngIf="isSidebarOpen">Danh mục</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/admin/users" routerLinkActive="active" class="nav-link">
            <i class="icon">👥</i>
            <span class="nav-text" *ngIf="isSidebarOpen">Người dùng</span>
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="admin-header">
      <div class="header-left">
        <button class="toggle-btn" (click)="toggleSidebar()">
          ☰
        </button>
      </div>
      
      <div class="header-right">
        <div class="notifications">
          <button class="icon-btn">
            🔔
            <span class="badge">3</span>
          </button>
        </div>
        <div class="user-menu">
          <div class="avatar">A</div>
          <span class="user-name">Admin User</span>
          <button class="logout-btn">Đăng xuất</button>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="page-container">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
