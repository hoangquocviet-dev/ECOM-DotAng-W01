<div class="admin-page-container">
  <div class="page-header">
    <h2>Gói Sản Phẩm (Combos)</h2>
    <button class="btn btn-primary">+ Tạo Combo</button>
  </div>

  <div class="table-container">
    <div *ngIf="isLoading" class="loading-state">
      Đang tải dữ liệu...
    </div>

    <table *ngIf="!isLoading" class="admin-table">
      <thead>
        <tr>
          <th>Mã</th>
          <th>Tên Combo</th>
          <th>Mô Tả</th>
          <th>Giá Gốc</th>
          <th>Giá Bán</th>
          <th>Trạng Thái</th>
          <th>Thao Tác</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of combos">
          <td>{{ c.id }}</td>
          <td><strong>{{ c.name }}</strong></td>
          <td>{{ c.description }}</td>
          <td><del>{{ c.originalPrice | currency:'VND' }}</del></td>
          <td class="text-danger"><strong>{{ c.price | currency:'VND' }}</strong></td>
          <td>
            <span class="badge" [ngClass]="c.isActive ? 'badge-success' : 'badge-secondary'">
              {{ c.isActive ? 'Kích hoạt' : 'Ẩn' }}
            </span>
          </td>
          <td>
            <div class="action-buttons">
              <button class="btn btn-sm btn-info">Sửa</button>
              <button class="btn btn-sm btn-danger">Xóa</button>
            </div>
          </td>
        </tr>
        <tr *ngIf="combos.length === 0">
          <td colspan="7" class="text-center">Chưa có Combo nào.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
